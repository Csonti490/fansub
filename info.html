<script>
    var Projects = [
        {
            title: "RWBY 5.évad 9.rész",
            percentage: "60",
            status: "Lektorálás alatt"
        },
        {
            title: "RWBY - World of Remnant - 3.rész",
            percentage: "50",
            status: "Lektorálás alatt"
        },
        {
            title: "Cím3",
            percentage: "10",
            status: "Fordítás alatt"
        }
    ]
    var hely = document.getElementById("stts");
    let adat = "";
    for(let i = 0; i < Projects.length; i++){
        adat += `<div class="row">
        <div class="col-4 border">
            ${Projects[i].title}
        </div>
        <div class="col-4 border">
            <progress class="w-75" id="file" max="100" value="${Projects[i].percentage}">${Projects[i].percentage}%</progress>
        </div>
        <div class="col-4 border">
            ${Projects[i].status}
        </div>
    </div>`;
    }
    hely.innerHTML = adat;
</script>
<style>
    progress {
        height: 1rem;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
    }
    progress:before{
        content: "asd";
    }
    #kint {
        height: 1.5rem;

    #bent {

</style>
